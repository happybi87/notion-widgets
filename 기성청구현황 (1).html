<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기성청구현황</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    padding: 16px 20px 12px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  .card {
    background: #f7f7f5;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .card-label {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    margin-bottom: 8px;
  }
  .card-value {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.2;
  }
  .card-value.green { color: #2d7a4f; }
  .card-value.red   { color: #c0392b; }
  .card-value.blue  { color: #1a5fa8; }
  .card-sub {
    font-size: 11px;
    color: #bbb;
    margin-top: 5px;
  }
</style>
</head>
<body>
  <div class="cards">
    <div class="card">
      <div class="card-label">전체 도급액</div>
      <div class="card-value">1,275억</div>
      <div class="card-sub">127,514,283,000원</div>
    </div>
    <div class="card">
      <div class="card-label">누적 기성청구액</div>
      <div class="card-value">75억</div>
      <div class="card-sub">7,543,427,707원</div>
    </div>
    <div class="card">
      <div class="card-label">수금액</div>
      <div class="card-value green">55억</div>
      <div class="card-sub">5,583,340,854원</div>
    </div>
    <div class="card">
      <div class="card-label">미청구액</div>
      <div class="card-value red">1,197억</div>
      <div class="card-sub">119,970,855,293원</div>
    </div>
    <div class="card">
      <div class="card-label">기성율</div>
      <div class="card-value blue">5.9%</div>
      <div class="card-sub">누적청구 / 전체도급</div>
    </div>
  </div>
</body>
</html>
