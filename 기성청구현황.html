<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기성청구현황</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    padding: 16px 20px 16px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  .card {
    background: #f7f7f5;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .card-label {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    margin-bottom: 8px;
  }
  .card-value {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.2;
    margin-bottom: 5px;
  }
  .card-value.green { color: #2d7a4f; }
  .card-value.red   { color: #c0392b; }
  .card-value.blue  { color: #1a5fa8; }
  .card-sub {
    font-size: 11px;
    color: #bbb;
    margin-bottom: 9px;
  }
  .bar-wrap {
    background: #e8e8e6;
    border-radius: 99px;
    height: 4px;
    width: 100%;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .bar { height: 4px; border-radius: 99px; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
  }
  .badge.up  { background: #e6f4ea; color: #2d7a4f; }
  .badge.dn  { background: #fdecea; color: #c0392b; }
  .badge.nt  { background: #f0f0ee; color: #888; }
</style>
</head>
<body>
  <div class="cards">

    <div class="card">
      <div class="card-label">전체 도급액</div>
      <div class="card-value">1,275억</div>
      <div class="card-sub">127,514,283,000원</div>
      <div class="bar-wrap"><div class="bar" style="width:100%; background:#d0d0cc;"></div></div>
      <span class="badge nt">기준금액</span>
    </div>

    <div class="card">
      <div class="card-label">누적 기성청구액</div>
      <div class="card-value blue">75억</div>
      <div class="card-sub">7,543,427,707원</div>
      <div class="bar-wrap"><div class="bar" style="width:5.9%; background:#1a5fa8;"></div></div>
      <span class="badge up">도급 대비 5.9%</span>
    </div>

    <div class="card">
      <div class="card-label">수금액</div>
      <div class="card-value green">55억</div>
      <div class="card-sub">5,583,340,854원</div>
      <div class="bar-wrap"><div class="bar" style="width:4.4%; background:#2d7a4f;"></div></div>
      <span class="badge up">도급 대비 4.4%</span>
    </div>

    <div class="card">
      <div class="card-label">미청구액</div>
      <div class="card-value red">1,197억</div>
      <div class="card-sub">119,970,855,293원</div>
      <div class="bar-wrap"><div class="bar" style="width:94.1%; background:#c0392b;"></div></div>
      <span class="badge dn">잔여 94.1%</span>
    </div>

    <div class="card">
      <div class="card-label">기성율</div>
      <div class="card-value blue">5.9%</div>
      <div class="card-sub">누적청구 / 전체도급</div>
      <div class="bar-wrap"><div class="bar" style="width:5.9%; background:#1a5fa8;"></div></div>
      <span class="badge nt">4차 진행중</span>
    </div>

  </div>
</body>
</html>
